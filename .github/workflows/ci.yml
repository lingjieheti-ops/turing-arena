name: CI

on:
  push:
    branches: [main]
    # The keeper commits keeper-state/ (reveals, cursor) every few minutes; those
    # data-only pushes must not trigger a full CI run.
    paths-ignore:
      - "keeper-state/**"
      - "media/**"
  pull_request:

# Run the JS-based actions (checkout / setup-node / pnpm) on Node 24 instead of
# the deprecated Node 20 runtime, so CI emits no "Node.js 20 actions are
# deprecated" annotations and keeps working after Node 20 leaves the runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  contracts:
    name: Contracts (Foundry · 52 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      # foundry-toolchain's binary download intermittently 504s from the release
      # server; retry the install so a transient network blip can't fail the run.
      - name: Install Foundry (retried)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 25
          command: |
            set -eo pipefail
            curl -L https://foundry.paradigm.xyz | bash
            "$HOME/.foundry/bin/foundryup"
            echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"
      - name: forge fmt --check
        working-directory: contracts
        run: forge fmt --check
      - name: forge build
        working-directory: contracts
        run: forge build
      - name: forge test
        working-directory: contracts
        run: forge test -vvv

  app:
    name: Typecheck + web build + integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install
      - name: Typecheck (shared + agent + web)
        run: pnpm typecheck
      - name: Build web
        run: pnpm --filter @turing-arena/web build
      - name: Keyless demo smoke test
        run: NO_COLOR=1 pnpm demo
      - name: Integrity scan (anti prompt-injection)
        run: pnpm check:integrity
