# Turing Arena — Foundry config.
# Mantle is OP-Stack / EVM-equivalent. We pin evm_version = "paris" (no PUSH0)
# for maximum L2 + verifier compatibility, and optimize for deploy cost on MNT.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
# via_ir needed: ERC-8004 giveFeedback (8 params + 11-arg event) overflows the
# legacy codegen stack. The IR pipeline also produces better-optimized output.
via_ir = true
ffi = false
fs_permissions = [
    { access = "read", path = "./" },
    { access = "read-write", path = "./deployments" },
]

[profile.ci]
fuzz = { runs = 1000 }
verbosity = 3

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
mantle = "${MANTLE_RPC_URL}"
mantle_sepolia = "${MANTLE_SEPOLIA_RPC_URL}"

# Mantlescan (Etherscan-style) verification. Confirm exact host with `forge verify` help.
[etherscan]
mantle = { key = "${MANTLESCAN_API_KEY}", chain = 5000, url = "https://api.mantlescan.xyz/api" }
mantle_sepolia = { key = "${MANTLESCAN_API_KEY}", chain = 5003, url = "https://api-sepolia.mantlescan.xyz/api" }
